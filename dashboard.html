<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEADCATS // Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/theme-portal.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <style>
    .boards-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .ann-board {
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .ann-board-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .ann-board-title {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ann-post-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 10px;
      padding: 8px 10px;
      cursor: crosshair;
    }

    .ann-items {
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .ann-empty {
      padding: 18px;
      border: 1px dashed var(--border);
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 11px;
      text-align: center;
    }

    @media (max-width: 960px) {
      .boards-row {
        gap: 16px;
      }
    }
  </style>
  <script type="module" src="assets/js/dashboard-app.js"></script>
</head>

<body>
  <div id="app-root"></div>
  <script src="assets/js/lofi-player.js"></script>
</body>

</html>
